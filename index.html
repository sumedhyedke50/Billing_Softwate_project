<!DOCTYPE html>
<html lang="en">
<head>
    <title>Restaurant Billing System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="bill">
    <h2 class="title">Sumedh Family Restaurant</h2>
    <p class="address">Cocsit Collage Latur</p>
    <p class="contact">📞 9370506129</p>

    <div class="inputs no-print">
        <input type="text" id="productName" list="productList" placeholder="Product Name">
        <datalist id="productList"></datalist>

        <input type="number" id="productRate" placeholder="Rate (₹)" readonly>
        <input type="number" id="productQty" placeholder="Qty">

        <button class="add-btn" onclick="addProduct()">Add</button>
    </div>

    <p id="dateTime" class="datetime"></p>

    <table>
        <thead>
            <tr>
                <th>Sr</th>
                <th>Product</th>
                <th>Rate</th>
                <th>Qty</th>
                <th>Amount</th>
                <th class="no-print">Remove</th>
            </tr>
        </thead>
        <tbody id="billBody"></tbody>
    </table>

    <h2 class="total">Total: ₹ <span id="totalAmount">0</span></h2>

    <button class="print-btn no-print" onclick="printBill()">🖨 Print Bill</button>
</div>

<h3 class="thanks">🙏 Please Visit Again 🙏</h3>

<script src="script.js"></script>
</body>
</html>
